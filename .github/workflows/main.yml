# Workflow for deployments based on branches
name: CI/CD Workflow

on:
  push:
    branches:
      - dev
      - test

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'
    - name: Install dependencies
      run: npm install
    - name: Run tests
      run: npm test
    - name: Deploy to Development Environment
      if: github.ref == 'refs/heads/dev'
      run: ./deploy.sh dev
    - name: Deploy to Test Environment
      if: github.ref == 'refs/heads/test'
      run: ./deploy.sh test
